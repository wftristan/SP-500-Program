name: Hourly Trading Engine

on:
  schedule:
    - cron: '0 * * * 1-5' # Runs at minute 0, every hour, Monday through Friday
  workflow_dispatch: # Allows you to click a "Run" button manually to test

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install Dependencies
        run: pip install -r requirements.txt
          
      - name: Run Engine
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          CAPITAL_API_KEY: ${{ secrets.CAPITAL_API_KEY }}
          CAPITAL_USER: ${{ secrets.CAPITAL_USER }}
          CAPITAL_PASS: ${{ secrets.CAPITAL_PASS }}
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        run: python main.py
